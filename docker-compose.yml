version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: job-recommender-backend
    restart: always
    volumes:
      - ./jobs.db:/app/jobs.db
    networks:
      - job-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: job-recommender-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - job-network

networks:
  job-network:
    driver: bridge
